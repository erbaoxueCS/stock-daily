name: Daily Stock Update
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Run daily update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/daily-update.js
      - name: Commit and push data
        run: |
          git config user.name "StockBot"
          git config user.email "stockbot@auto.com"
          git add data/recommendations.json
          git diff --staged --quiet || git commit -m "Daily stock update $(date +%Y-%m-%d)"
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          commit_message: "Pages deploy: $(date +%Y-%m-%d)"
