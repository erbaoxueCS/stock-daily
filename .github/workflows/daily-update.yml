name: Daily Stock Recommendation Update

on:
  schedule:
    # 北京时间每天下午18:00执行 (UTC 10:00)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  update-recommendations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run daily update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/daily-update.js

      - name: Commit and push if changed
        run: |
          git config user.name "StockBot"
          git config user.email "stockbot@auto.com"
          git add data/recommendations.json
          git diff --staged --quiet || (git commit -m "📊 每日股票推荐更新 $(date +'%Y-%m-%d')" && git push)
