name: Daily Stock Update
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Run daily update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/daily-update.js
      - name: Commit and push
        run: |
          git config user.name "StockBot"
          git config user.email "stockbot@auto.com"
          git add data/recommendations.json
          git diff --staged --quiet || (git commit -m "Daily stock update $(date +%Y-%m-%d)" && git push)
      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        uses: actions/deploy-pages@v4
