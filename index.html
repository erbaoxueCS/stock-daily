<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日A股潜力推荐 | AI智能分析</title>
  <meta name="description" content="基于东方财富实时行情 + DeepSeek V4 AI分析，每日推荐A股潜力股票：低估值精选、热点板块、新闻驱动、技术形态四大类别。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="site-title">📈 每日A股潜力推荐</h1>
        <p class="site-subtitle">东方财富实时行情 + DeepSeek V4 AI智能分析</p>
        <div class="update-info">
          <span class="update-badge" id="updateTime">加载中...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Market Summary -->
  <section class="market-summary" id="marketSummary">
    <div class="container">
      <div class="summary-card">
        <h2>📋 今日市场概览</h2>
        <p id="summaryText">加载中...</p>
      </div>
    </div>
  </section>

  <!-- Category Tabs -->
  <section class="categories-section">
    <div class="container">
      <div class="category-tabs" id="categoryTabs">
        <!-- JS生成 -->
      </div>
    </div>
  </section>

  <!-- Stock Cards -->
  <section class="stocks-section">
    <div class="container">
      <div class="category-title" id="activeCategoryTitle">
        <h2></h2>
        <p></p>
      </div>
      <div class="stock-grid" id="stockGrid">
        <!-- JS生成 -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>暂无推荐数据，请稍后刷新页面</p>
      </div>
    </div>
  </section>

  <!-- Risk Warning -->
  <section class="risk-section">
    <div class="container">
      <div class="risk-card" id="riskWarning">
        <p>加载中...</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-col">
          <h3>数据来源</h3>
          <p>东方财富实时行情数据</p>
          <p>DeepSeek V4 AI分析引擎</p>
        </div>
        <div class="footer-col">
          <h3>免责声明</h3>
          <p>本页面所有内容仅供参考，</p>
          <p>不构成任何投资建议。</p>
          <p>投资有风险，入市需谨慎。</p>
        </div>
        <div class="footer-col">
          <h3>更新频率</h3>
          <p>每个交易日 18:00</p>
          <p>自动更新推荐数据</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 每日A股推荐 | Powered by DeepSeek AI & 东方财富</p>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
